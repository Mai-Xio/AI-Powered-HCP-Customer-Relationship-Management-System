services:
  mysql:
    image: mysql:8.4
    container_name: aivoa-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aivoa_crm
      MYSQL_USER: aivoa_user
      MYSQL_PASSWORD: aivoa_password
      MYSQL_ROOT_PASSWORD: aivoa_root_password
    ports:
      - "3306:3306"
    volumes:
      - aivoa_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uaivoa_user -paivoa_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  aivoa_mysql_data:
